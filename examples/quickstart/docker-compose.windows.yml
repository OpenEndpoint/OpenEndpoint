version: '3.8'

services:
  openendpoint:
    image: ghcr.io/openendpoint/openendpoint:latest
    container_name: openendpoint
    ports:
      - "8080:8080"
      - "9000:9000"
    environment:
      - OPENEP_SERVER_HOST=0.0.0.0
      - OPENEP_SERVER_PORT=8080
      - OPENEP_STORAGE_TYPE=flatfile
      - OPENEP_STORAGE_PATH=/data
      - OPENEP_LOG_LEVEL=info
    volumes:
      - openendpoint-data:/data
      - ./config.windows.yaml:/etc/openendpoint/config.yaml:ro
    command: ["--config", "/etc/openendpoint/config.yaml"]
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  openendpoint-data:
