version: '3.8'

services:
  openendpoint:
    image: ghcr.io/openendpoint/openendpoint:latest
    container_name: openendpoint
    ports:
      - "8080:8080"
      - "9000:9000"
    environment:
      - OPENEP_SERVER_HOST=0.0.0.0
      - OPENEP_SERVER_PORT=8080
      - OPENEP_STORAGE_TYPE=flatfile
      - OPENEP_STORAGE_PATH=/data
      - OPENEP_LOG_LEVEL=info
    volumes:
      - ./data:/data
      - ./config.yaml:/etc/openendpoint/config.yaml:ro
    command: ["--config", "/etc/openendpoint/config.yaml"]
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # Optional: Web UI for browsing
  minio-console:
    image: minio/minio:latest
    container_name: openendpoint-ui
    ports:
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=demo-access-key
      - MINIO_ROOT_PASSWORD=demo-secret-key
    command: server --console-address ":9001" http://openendpoint:9000
    depends_on:
      - openendpoint
    profiles:
      - ui
